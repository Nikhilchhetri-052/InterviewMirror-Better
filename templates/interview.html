<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Mirror - Interview</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .play-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
            vertical-align: middle;
            margin-left: 5px;
        }
        .nav-icon-link {
            display: flex;
            align-items: center;
        }
        .nav-icon-link svg {
            color: var(--light-text);
            transition: color 0.3s ease;
            margin-right: 5px;
        }
        .nav-icon-link svg:hover {
            color: var(--primary-purple);
        }
        .user-profile-text {
            color: var(--light-text);
            font-weight: 500;
        }
        .user-profile-text:hover {
            color: var(--primary-purple);
        }
    </style>
</head>
<body data-auth-required="true">
    <nav class="navbar">
        <div class="navbar-brand"><a href="{{ url_for('index') }}" class="nav-link active">Interview Mirror</a></div>
        <ul class="navbar-links">
            <li><a href="{{ url_for('index') }}" class="nav-link active">Home</a></li>
            <li><a href="{{ url_for('about') }}" class="nav-link">About</a></li>
            <li><a href="{{ url_for('Contactus') }}" class="nav-link">Contact</a></li>
            <li class="logged-out-only"><a href="{{ url_for('register') }}" class="btn nav-btn-primary">Sign Up</a></li>
            <li class="logged-out-only"><a href="{{ url_for('login') }}" class="btn nav-btn-secondary">Log In</a></li>
        </ul>
    </nav>

    <main class="container interview-page-container">
        <h1 id="interviewRole" class="interview-role-title"></h1>
        <p class="question-count">Question 1 of 5</p>

        <section class="question-card">
            <p id="questionText" class="question-text"></p>
            <div class="ai-voice-player">
                <div class="ai-voice-info">
                    <img src="https://placehold.co/30x30/8A2BE2/FFFFFF?text=AI" alt="AI Icon" class="ai-icon">
                    <span>AI Interviewer</span>
                    <span id="aiVoiceStatus">Speaking...</span>
                </div>
                <button id="playVoiceBtn" class="btn play-voice-btn">
                    <svg class="play-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </button>
            </div>
            <div class="animated-circle-wrapper">
                <div class="animated-circle" id="animatedCircle"></div>
            </div>
        </section>

        <section class="answer-section">
            <div class="record-controls">
                <button id="recordBtn" class="btn primary-btn record-btn">🎙️ Start Recording</button>
                <button id="pauseBtn" class="btn secondary-btn pause-btn" disabled>⏸ Pause</button>
                <button id="stopBtn" class="btn secondary-btn stop-btn" disabled>⏹ Stop</button>
            </div>
            <p class="record-hint" id="recordHint">Click "Start Recording" to begin speaking.</p>
        </section>

        <section class="feedback-section">
            <h2>Feedback</h2>
            <div id="aiFeedback" class="feedback-box">
                Your feedback will appear here after you record your answer.
            </div>
        </section>

        <div class="bottom-nav">
            <a href="{{ url_for('index') }}" class="btn secondary-btn">Back to Home</a>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2024 Interview Mirror. All rights reserved.</p>
    </footer>

    <script type="module" src="{{ url_for('static', filename='scripts/main.js') }}"></script>
    <script type="module">
        if (typeof window.capitalizeFirstLetter !== "function") {
            window.capitalizeFirstLetter = function (str) {
                if (!str) return "";
                return str.charAt(0).toUpperCase() + str.slice(1);
            };
        }
        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof window.isAuthReady === "function") {
                while (!window.isAuthReady()) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
            }
            const params = new URLSearchParams(window.location.search);
            const role = params.get('role') || 'general';

            const interviewRoleElement = document.getElementById('interviewRole');
            const questionTextElement = document.getElementById('questionText');
            const animatedCircle = document.getElementById('animatedCircle');
            const playVoiceBtn = document.getElementById('playVoiceBtn');
            const aiFeedback = document.getElementById('aiFeedback');
            const aiVoiceStatus = document.getElementById('aiVoiceStatus');
            const recordHint = document.getElementById('recordHint');
            const questionCountEl = document.querySelector('.question-count');

            interviewRoleElement.textContent = `${window.capitalizeFirstLetter(role)} Interview`;

            let interviewId = null;
            let currentQuestion = "";
            let currentMode = "main";
            let currentIndex = 1;
            let totalQuestions = 5;

            function updateQuestionCount() {
                if (currentMode === "followup") {
                    questionCountEl.textContent = `Follow-up to Question ${currentIndex} of ${totalQuestions}`;
                } else {
                    questionCountEl.textContent = `Question ${currentIndex} of ${totalQuestions}`;
                }
            }

            function formatEvaluation(evaluation) {
                if (!evaluation) return "No feedback available.";
                const scores = evaluation.scores || {};
                return (
                    `Feedback: ${evaluation.feedback || "No feedback."}\n` +
                    `Scores - Technical: ${scores.technical ?? "N/A"}, ` +
                    `Communication: ${scores.communication ?? "N/A"}, ` +
                    `Depth: ${scores.depth ?? "N/A"}, ` +
                    `Overall: ${evaluation.overall ?? "N/A"}`
                );
            }

            async function startInterview() {
                const response = await fetch("/api/interview/start", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ role, difficulty: "medium", max_questions: 5 }),
                });
                const data = await response.json();
                interviewId = data.interview_id;
                currentQuestion = data.question;
                currentMode = data.mode;
                currentIndex = data.question_index;
                totalQuestions = data.total_questions;
                questionTextElement.textContent = currentQuestion;
                updateQuestionCount();
            }

            await startInterview();

            playVoiceBtn.addEventListener('click', async () => {
                const text = document.getElementById('questionText').textContent;
                aiVoiceStatus.textContent = "Speaking...";
                playVoiceBtn.disabled = true;

                try {
                    const response = await fetch("/speak", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ text })
                    });

                    if (!response.ok) {
                        throw new Error("Error fetching TTS audio");
                    }

                    const audioBlob = await response.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    audio.play();

                    audio.onended = () => {
                        aiVoiceStatus.textContent = "Ready";
                        playVoiceBtn.disabled = false;
                    };

                } catch (err) {
                    console.error("TTS Error:", err);
                    aiVoiceStatus.textContent = "Error playing voice.";
                    playVoiceBtn.disabled = false;
                }
            });

            let mediaRecorder;
            let audioChunks = [];
            let isPaused = false;

            const recordBtn = document.getElementById('recordBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const stopBtn = document.getElementById('stopBtn');
            animatedCircle.classList.add('ready');

            recordBtn.addEventListener('click', async () => {
                if (!mediaRecorder || mediaRecorder.state === "inactive") {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (e) => {
                        audioChunks.push(e.data);
                    };

                    mediaRecorder.onstart = () => {
                        animatedCircle.classList.remove('ready', 'paused');
                        animatedCircle.classList.add('recording');
                    };

                    mediaRecorder.onpause = () => {
                        recordHint.textContent = "Recording paused.";
                        pauseBtn.textContent = "▶️ Resume";
                        isPaused = true;
                        animatedCircle.classList.remove('recording');
                        animatedCircle.classList.add('paused');
                    };

                    mediaRecorder.onresume = () => {
                        recordHint.textContent = "Recording resumed. Speak now!";
                        pauseBtn.textContent = "⏸ Pause";
                        isPaused = false;
                        animatedCircle.classList.remove('paused');
                        animatedCircle.classList.add('recording');
                    };

                    mediaRecorder.onstop = async () => {
                        recordHint.textContent = "Processing your answer...";
                        aiFeedback.textContent = "Transcribing your answer...";
                        animatedCircle.classList.remove('recording', 'paused');
                        animatedCircle.classList.add('ready');

                        const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
                        const formData = new FormData();
                        formData.append("audio", audioBlob, "answer.webm");

                        const whisperRes = await fetch("/record", {
                            method: "POST",
                            body: formData,
                        });

                        const whisperData = await whisperRes.json();
                        const transcribedAnswer = whisperData.text;

                        recordHint.textContent = "Getting feedback...";
                        aiFeedback.textContent = "Analyzing your response...";

                        const answerRes = await fetch("/api/interview/answer", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                interview_id: interviewId,
                                answer: transcribedAnswer,
                            }),
                        });

                        const answerData = await answerRes.json();
                        aiFeedback.textContent = formatEvaluation(answerData.evaluation);

                        if (answerData.done) {
                            const summary = answerData.summary;
                            questionTextElement.textContent = "Interview complete. Review your feedback below.";
                            currentMode = "done";
                            recordHint.textContent = summary?.summary || "Session complete.";
                            recordBtn.disabled = true;
                            pauseBtn.disabled = true;
                            stopBtn.disabled = true;
                        } else {
                            currentQuestion = answerData.next_question;
                            currentMode = answerData.mode;
                            currentIndex = answerData.question_index;
                            totalQuestions = answerData.total_questions;
                            questionTextElement.textContent = currentQuestion;
                            updateQuestionCount();
                        }

                        recordBtn.disabled = false;
                        pauseBtn.disabled = true;
                        stopBtn.disabled = true;
                        recordBtn.textContent = "🎙️ Start Recording";
                    };

                    mediaRecorder.start();
                    recordBtn.disabled = true;
                    pauseBtn.disabled = false;
                    stopBtn.disabled = false;
                    recordHint.textContent = "Recording... Speak now!";
                    aiFeedback.textContent = "Listening...";
                }
            });

            pauseBtn.addEventListener('click', () => {
                if (mediaRecorder && mediaRecorder.state === "recording") {
                    mediaRecorder.pause();
                } else if (mediaRecorder && mediaRecorder.state === "paused") {
                    mediaRecorder.resume();
                }
            });

            stopBtn.addEventListener('click', () => {
                if (mediaRecorder && mediaRecorder.state !== "inactive") {
                    mediaRecorder.stop();
                }
            });
        });
    </script>
</body>
</html>
