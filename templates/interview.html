<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Mirror - Interview</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .play-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
            vertical-align: middle;
            margin-left: 5px;
        }
        .nav-icon-link {
            display: flex;
            align-items: center;
        }
        .nav-icon-link svg {
            color: var(--light-text);
            transition: color 0.3s ease;
            margin-right: 5px;
        }
        .nav-icon-link svg:hover {
            color: var(--primary-purple);
        }
        .user-profile-text {
            color: var(--light-text);
            font-weight: 500;
        }
        .user-profile-text:hover {
            color: var(--primary-purple);
        }
    </style>
</head>
<body data-auth-required="true">
    <nav class="navbar">
        <div class="navbar-brand"><a href="{{ url_for('index') }}" class="nav-link active">Interview Mirror</a></div>
        <ul class="navbar-links">
            <li><a href="{{ url_for('index') }}" class="nav-link active">Home</a></li>
            <li><a href="{{ url_for('about') }}" class="nav-link">About</a></li>
            <li><a href="{{ url_for('Contactus') }}" class="nav-link">Contact</a></li>
            <li class="logged-out-only"><a href="{{ url_for('register') }}" class="btn nav-btn-primary">Sign Up</a></li>
            <li class="logged-out-only"><a href="{{ url_for('login') }}" class="btn nav-btn-secondary">Log In</a></li>
        </ul>
    </nav>

    <main class="container interview-page-container">
        <h1 id="interviewRole" class="interview-role-title"></h1>
        <p class="question-count">Question 1 of 5</p>

        <section class="question-card">
            <p id="questionText" class="question-text"></p>
            <div class="ai-voice-player">
                <div class="ai-voice-info">
                    <img src="https://placehold.co/30x30/8A2BE2/FFFFFF?text=AI" alt="AI Icon" class="ai-icon">
                    <span>AI Interviewer</span>
                    <span id="aiVoiceStatus">Speaking...</span>
                </div>
                <button id="playVoiceBtn" class="btn play-voice-btn">
                    <svg class="play-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </button>
            </div>
            <div class="animated-circle-wrapper">
                <div class="animated-circle" id="animatedCircle"></div>
            </div>
        </section>

        <section class="answer-section">
            <div class="record-controls">
                <button id="recordBtn" class="btn primary-btn record-btn">🎙️ Start Recording</button>
                <button id="pauseBtn" class="btn secondary-btn pause-btn" disabled>⏸ Pause</button>
                <button id="stopBtn" class="btn secondary-btn stop-btn" disabled>⏹ Stop</button>
            </div>
            <p class="record-hint" id="recordHint">Click "Start Recording" to begin speaking.</p>
        </section>

        <section class="feedback-section">
            <h2>Feedback</h2>
            <div id="aiFeedback" class="feedback-box">
                Your feedback will appear here after you record your answer.
            </div>
        </section>

        <div class="bottom-nav">
            <a href="{{ url_for('index') }}" class="btn secondary-btn">Back to Home</a>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2024 Interview Mirror. All rights reserved.</p>
    </footer>

    <script type="module" src="{{ url_for('static', filename='scripts/main.js') }}"></script>
    <script type="module">
        // Define capitalizeFirstLetter globally if missing
        if (typeof window.capitalizeFirstLetter !== "function") {
            window.capitalizeFirstLetter = function (str) {
                if (!str) return "";
                return str.charAt(0).toUpperCase() + str.slice(1);
            };
        }
        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof window.isAuthReady === "function") {
                while (!window.isAuthReady()) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
            }
            const params = new URLSearchParams(window.location.search);
            const role = params.get('role');
            const interviewRoleElement = document.getElementById('interviewRole');
            const questionTextElement = document.getElementById('questionText');
            const animatedCircle = document.getElementById('animatedCircle');
            const playVoiceBtn = document.getElementById('playVoiceBtn');
            const recordAnswerBtn = document.getElementById('recordAnswerBtn');
            const aiFeedback = document.getElementById('aiFeedback');
            const aiVoiceStatus = document.getElementById('aiVoiceStatus');
            const recordHint = document.getElementById('recordHint');

            if (role) {
                interviewRoleElement.textContent = `${window.capitalizeFirstLetter(role)} Interview`;
            } else {
                interviewRoleElement.textContent = 'General Interview';
            }

            const questions = {
                frontend: "Tell me about a challenging frontend project you've worked on and how you overcame obstacles.",
                backend: "Explain the concept of RESTful APIs and how you've used them in your projects.",
                devops: "Describe your experience with CI/CD pipelines and tools like Jenkins or GitLab CI.",
                fullstack: "How do you approach designing a scalable web application from both frontend and backend perspectives?",
                qa: "What's your approach to testing a new feature, from unit tests to end-to-end tests?",
                datascience: "Walk me through a data science project you're proud of, focusing on your methodology.",
                productmanager: "How do you prioritize features for a new product, and what frameworks do you use?"
            };

            const currentQuestion = questions[role] || "Tell me about yourself and your career aspirations.";
            questionTextElement.textContent = currentQuestion;

            function startPulseAnimation() {
                animatedCircle.classList.add('pulsing');
                aiVoiceStatus.textContent = 'Speaking...';
            }
            function stopPulseAnimation() {
                animatedCircle.classList.remove('pulsing');
                aiVoiceStatus.textContent = 'Ready.';
            }

            playVoiceBtn.addEventListener('click', () => {
                playVoiceBtn.disabled = true;
                startPulseAnimation();
                setTimeout(() => {
                    stopPulseAnimation();
                    playVoiceBtn.disabled = false;
                }, 3000);
            });

            // 🎤 Voice Recording + Whisper Integration with Pause/Stop + Circle Colors
            let mediaRecorder;
            let audioChunks = [];
            let isPaused = false;

            const recordBtn = document.getElementById('recordBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const stopBtn = document.getElementById('stopBtn');
            // 🟢 Start as "ready"
            animatedCircle.classList.add('ready');

            recordBtn.addEventListener('click', async () => {
                console.log("🎙️ Start Recording button clicked");
                if (!mediaRecorder || mediaRecorder.state === "inactive") {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    console.log("✅ Microphone access granted");
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (e) => {
                        audioChunks.push(e.data);
                    };

                    // 🔴 Recording started
                    mediaRecorder.onstart = () => {
                        animatedCircle.classList.remove('ready', 'paused');
                        animatedCircle.classList.add('recording');
                    };

                    // 🟡 Paused
                    mediaRecorder.onpause = () => {
                        recordHint.textContent = "Recording paused.";
                        pauseBtn.textContent = "▶️ Resume";
                        isPaused = true;
                        animatedCircle.classList.remove('recording');
                        animatedCircle.classList.add('paused');
                    };

                    // 🔴 Resumed
                    mediaRecorder.onresume = () => {
                        recordHint.textContent = "Recording resumed. Speak now!";
                        pauseBtn.textContent = "⏸ Pause";
                        isPaused = false;
                        animatedCircle.classList.remove('paused');
                        animatedCircle.classList.add('recording');
                    };

                    // 🟢 Stopped
                    mediaRecorder.onstop = async () => {
                        recordHint.textContent = "Processing your answer...";
                        aiFeedback.textContent = "Transcribing your answer...";
                        animatedCircle.classList.remove('recording', 'paused');
                        animatedCircle.classList.add('ready');

                        const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
                        const formData = new FormData();
                        formData.append("audio", audioBlob, "answer.webm");

                        const whisperRes = await fetch("http://127.0.0.1:5000/record", {
                            method: "POST",
                            body: formData,
                        });

                        const whisperData = await whisperRes.json();
                        const transcribedAnswer = whisperData.text;

                        recordHint.textContent = "Getting feedback...";
                        aiFeedback.textContent = "Analyzing your response...";

                        const feedbackRes = await fetch("http://127.0.0.1:5000/api/generate_feedback", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                answer: transcribedAnswer,
                                question: currentQuestion,
                                role: role,
                            }),
                        });

                        const feedbackData = await feedbackRes.json();
                        aiFeedback.textContent = feedbackData.feedback || "Error generating feedback.";

                        // Reset UI
                        recordBtn.disabled = false;
                        pauseBtn.disabled = true;
                        stopBtn.disabled = true;
                        recordBtn.textContent = "🎙️ Start Recording";
                    };

                    mediaRecorder.start();
                    recordBtn.disabled = true;
                    pauseBtn.disabled = false;
                    stopBtn.disabled = false;
                    recordHint.textContent = "Recording... Speak now!";
                    aiFeedback.textContent = "Listening...";
                }
            });

            pauseBtn.addEventListener('click', () => {
                if (mediaRecorder && mediaRecorder.state === "recording") {
                    mediaRecorder.pause();
                } else if (mediaRecorder && mediaRecorder.state === "paused") {
                    mediaRecorder.resume();
                }
            });

            stopBtn.addEventListener('click', () => {
                if (mediaRecorder && mediaRecorder.state !== "inactive") {
                    mediaRecorder.stop();
                }
            });
        });
    </script>
</body>
</html>
